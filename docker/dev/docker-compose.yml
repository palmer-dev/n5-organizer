services:
  mongodb:
    image: mongo:latest
    container_name: mongodb-dev
    hostname: mongodb
    volumes:
      - ../../mongodb/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - mongodb-data:/data/db/
      - mongodb-log:/var/log/mongodb/
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    networks:
      - app_network_dev

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express-dev
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_SERVER: 'mongodb'
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}
    ports:
      - "8081:8081"
    networks:
      - app_network_dev
    depends_on:
      - mongodb

  backend:
    image: node:lts-alpine3.22
    container_name: backend-dev
    working_dir: /app
    volumes:
      - ../../backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - mongodb
    networks:
      - app_network_dev

  frontend:
    image: node:lts-alpine3.22
    container_name: frontend-dev
    working_dir: /app
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host --port 3000"
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - app_network_dev

volumes:
  mongodb-data:
    driver: local
    name: mongo-data-dev
  mongodb-log:
    driver: local
    name: mongo-log-dev

networks:
  app_network_dev:
    driver: bridge
    name: app-network-dev
